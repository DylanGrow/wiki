<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <!-- Background circle (optional, matches standard app icons) -->
  <rect width="512" height="512" rx="128" fill="#090d16" />
  
  <!-- Outer Shield Glow -->
  <path d="M256 55 C190 55, 120 75, 100 135 C100 280, 200 390, 256 445 C312 390, 412 280, 412 135 C392 75, 322 55, 256 55 Z" 
        fill="none" stroke="url(#glowGrad)" stroke-width="12" opacity="0.4" />
        
  <!-- Main Shield -->
  <path d="M256 70 C198 70, 134 88, 115 140 C115 270, 205 375, 256 425 C307 375, 397 270, 397 140 C378 88, 314 70, 256 70 Z" 
        fill="url(#shieldGrad)" stroke="url(#glowGrad)" stroke-width="8" />

  <!-- Shield Core - Secure Document Icon -->
  <rect x="196" y="160" width="120" height="150" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="6" />
  <!-- Dog-eared page fold -->
  <path d="M286 160 L316 190 L286 190 Z" fill="#06b6d4" />
  
  <!-- Lines representing wiki content -->
  <line x1="216" y1="210" x2="270" y2="210" stroke="#14b8a6" stroke-width="5" stroke-linecap="round" />
  <line x1="216" y1="240" x2="296" y2="240" stroke="#0d9488" stroke-width="5" stroke-linecap="round" />
  <line x1="216" y1="270" x2="280" y2="270" stroke="#0d9488" stroke-width="5" stroke-linecap="round" />
  
  <!-- Glowing lock symbol on top -->
  <circle cx="256" cy="350" r="22" fill="#0f172a" stroke="#14b8a6" stroke-width="6" />
  <path d="M244 350 L244 380 L268 380 L268 350" stroke="#14b8a6" stroke-width="5" fill="none" stroke-linecap="round" />
</svg>
